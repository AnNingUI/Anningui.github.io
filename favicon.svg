<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="8" fill="#1A1A3E"/>

  <!-- 打开的书本 - 居中旋转180° -->
  <g transform="translate(16, 16) rotate(180) translate(-16, -16)">

    <!-- 左页右页填充（无描边） -->
    <path d="M4 6 L16 4 L16 26 L4 28 Z" fill="#1E1E3F"/>
    <path d="M28 6 L16 4 L16 26 L28 28 Z" fill="#1E1E3F"/>

    <!-- 书脊 -->
    <line x1="16" y1="4" x2="16" y2="26" stroke="#6b9aff" stroke-width="1.8" stroke-linecap="round"/>

    <!-- 四周单独描边 -->
    <!-- 左页顶边（贝塞尔弧度） -->
    <path d="M4 6 Q10 9 16 4" stroke="#FF6B9D" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <line x1="4" y1="6" x2="4" y2="28" stroke="#FF6B9D" stroke-width="1.2" stroke-linecap="round"/>   <!-- 左边 -->
    <!-- 左页底边（贝塞尔弧度） -->
    <path d="M16 26 Q10 29 4 28" stroke="#6b9aff" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- 右页顶边（贝塞尔弧度） -->
    <path d="M28 6 Q22 9 16 4" stroke="#FF6B9D" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <line x1="28" y1="6" x2="28" y2="28" stroke="#FF6B9D" stroke-width="1.2" stroke-linecap="round"/> <!-- 右边 -->
    <!-- 右页底边（贝塞尔弧度） -->
    <path d="M16 26 Q22 29 28 28" stroke="#6b9aff" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- 左页文字（贝塞尔弧度，随页面内凹） -->
    <path d="M7 12 Q10.5 12.5 14 11.5" stroke="#4ECDC4" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M7 15 Q10.5 15.5 14 14.5" stroke="#A594F9" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M7 18 Q10 18.5 13 17.5" stroke="#4ECDC4" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M7 21 Q10.5 21.5 14 20.5" stroke="#A594F9" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- 右页文字（与原左页镜像，保持对称） -->
    <path d="M18 11.5 Q21.5 12.5 25 12" stroke="#4ECDC4" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M18 14.5 Q21.5 15.5 25 15" stroke="#A594F9" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M19 17.5 Q22 18.5 25 18" stroke="#4ECDC4" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M18 20.5 Q21.5 21.5 25 21" stroke="#A594F9" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  </g>
</svg>
